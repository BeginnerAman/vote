<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Roast & Guess — Party Game</title>
  <!-- TailwindCSS + Font Awesome + GSAP -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body {
      background: radial-gradient(circle at 10% 30%, #0a0f1e, #03050b);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .glass-card {
      background: rgba(20, 25, 40, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2rem;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
    }
    .roast-text {
      background: linear-gradient(135deg, #f97316, #dc2626);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }
    .vote-btn, .guess-option {
      transition: transform 0.15s, background 0.2s;
    }
    .vote-btn:active, .guess-option:active {
      transform: scale(0.96);
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #f97316;
      border-radius: 8px;
    }
  </style>
</head>
<body class="text-white font-sans antialiased">

  <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4 md:p-6">
    <div id="screenContainer" class="w-full max-w-5xl mx-auto"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, push, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvk4riEC5qhNFNMA9O_rx-S1kAwrHzvbw",
      authDomain: "voteroast-57ecf.firebaseapp.com",
      projectId: "voteroast-57ecf",
      storageBucket: "voteroast-57ecf.firebasestorage.app",
      messagingSenderId: "654433059396",
      appId: "1:654433059396:web:8105dfa734d040ec4df211",
      databaseURL: "https://voteroast-57ecf-default-rtdb.firebaseio.com"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let currentRoomId = null;
    let currentPlayerId = null;
    let currentNickname = null;
    let unsubscribeRoom = null;
    
    const generateRoomCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
    
    const roastMessages = [
      "🍗 *SLOW ROASTED* 🍗: {name} itni lazy hai ki sofa ne inko adopt kar liya! 😂🔥",
      "⚡ *ELECTRIC ROAST*: {name} ki energy level dead snake se bhi neeche 🐍💀",
      "🤡 *CLOWN AWARD*: {name} ka dimaag vacation pe hai! 🤯🤣",
      "🐢 *TURTLE POWER*: {name} se race mein tortoise bhi jeet jaaye! 🏆😭",
      "📉 *LOW EFFORT KING*: {name} ne aaj breathing ke alawa kuch nahi kiya 🤌💨",
      "🔥 *BURN NOTICE*: {name} ki wattage zero — bulb bhi roshni nahi de sakta 💡😆"
    ];
    
    const funnyQuestions = [
      "🤔 sabse lazy kaun hai?",
      "😈 sabse jyada bakwas kaun karta hai?",
      "😂 most likely to snore in class?",
      "💀 kon sabse zyada overacting karta hai?",
      "🍕 sabse bada khau kaun hai?",
      "📸 selfie addict kaun hai?"
    ];
    
    function renderScreen(component) {
      const container = document.getElementById("screenContainer");
      if (container) container.innerHTML = component;
      gsap.fromTo(".glass-card", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, stagger: 0.05 });
    }
    
    // ---------- JOIN / CREATE ----------
    function showJoinScreen() {
      renderScreen(`
        <div class="glass-card p-8 md:p-12 w-full max-w-md mx-auto text-center">
          <div class="mb-6">
            <i class="fas fa-fire text-5xl text-orange-500 mb-2"></i>
            <h1 class="text-4xl font-black bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">ROAST & GUESS</h1>
            <p class="text-gray-300 mt-2">Party game · 2–6 players</p>
          </div>
          <div class="space-y-4">
            <input type="text" id="nicknameInput" placeholder="Your funky name" maxlength="16" class="w-full p-3 rounded-xl bg-gray-800/80 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-orange-500">
            <input type="text" id="roomCodeInput" placeholder="Room code (optional)" class="w-full p-3 rounded-xl bg-gray-800/80 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-orange-500">
            <div class="flex gap-3 flex-wrap justify-center">
              <button id="createRoomBtn" class="bg-orange-600 hover:bg-orange-500 px-6 py-3 rounded-full font-bold transition-all shadow-lg flex-1"><i class="fas fa-plus-circle"></i> Create Room</button>
              <button id="joinRoomBtn" class="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-full font-bold transition-all flex-1"><i class="fas fa-sign-in-alt"></i> Join</button>
            </div>
          </div>
          <p class="text-xs text-gray-400 mt-6">🔥 No login · Real-time chaos</p>
        </div>
      `);
      
      document.getElementById("createRoomBtn")?.addEventListener("click", async () => {
        let nickname = document.getElementById("nicknameInput").value.trim();
        if (!nickname) nickname = "Roster_" + Math.floor(Math.random() * 999);
        const roomCode = generateRoomCode();
        await createNewRoom(roomCode, nickname);
      });
      
      document.getElementById("joinRoomBtn")?.addEventListener("click", async () => {
        let nickname = document.getElementById("nicknameInput").value.trim();
        if (!nickname) nickname = "Guest_" + Math.floor(Math.random() * 999);
        let roomCode = document.getElementById("roomCodeInput").value.trim().toUpperCase();
        if (!roomCode) return alert("Enter room code!");
        await joinExistingRoom(roomCode, nickname);
      });
    }
    
    async function createNewRoom(roomCode, nickname) {
      const roomRef = ref(db, `rooms/${roomCode}`);
      const snapshot = await get(roomRef);
      if (snapshot.exists()) return createNewRoom(generateRoomCode(), nickname);
      const playerId = generatePlayerId();
      const initialData = {
        gameState: "waiting",
        players: {
          [playerId]: { nickname: nickname, score: 0, joinedAt: Date.now() }
        },
        round1: { votes: {}, roastedPlayerId: null, question: null, pointsAwarded: false },
        round2: { messages: {}, guesses: {} },
        createdAt: Date.now()
      };
      await set(roomRef, initialData);
      const playerRef = ref(db, `rooms/${roomCode}/players/${playerId}`);
      onDisconnect(playerRef).remove();
      currentRoomId = roomCode;
      currentPlayerId = playerId;
      currentNickname = nickname;
      sessionStorage.setItem("roastPlayerId", playerId);
      sessionStorage.setItem("roastRoomId", roomCode);
      attachRoomListener(roomCode);
    }
    
    async function joinExistingRoom(roomCode, nickname) {
      const roomRef = ref(db, `rooms/${roomCode}`);
      const snapshot = await get(roomRef);
      if (!snapshot.exists()) return alert("Room not found! Create a new one.");
      const roomData = snapshot.val();
      const playerCount = roomData.players ? Object.keys(roomData.players).length : 0;
      if (playerCount >= 6) return alert("Room is full (max 6 players) 😢");
      if (roomData.gameState !== "waiting") return alert("Game already in progress, please wait for replay or new room.");
      const playerId = generatePlayerId();
      const updates = {};
      updates[`rooms/${roomCode}/players/${playerId}`] = { nickname: nickname, score: 0, joinedAt: Date.now() };
      await update(ref(db), updates);
      const playerRef = ref(db, `rooms/${roomCode}/players/${playerId}`);
      onDisconnect(playerRef).remove();
      currentRoomId = roomCode;
      currentPlayerId = playerId;
      currentNickname = nickname;
      sessionStorage.setItem("roastPlayerId", playerId);
      sessionStorage.setItem("roastRoomId", roomCode);
      attachRoomListener(roomCode);
    }
    
    function generatePlayerId() {
      return "p_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
    }
    
    // ---------- MAIN LISTENER ----------
    function attachRoomListener(roomId) {
      if (unsubscribeRoom) unsubscribeRoom();
      const roomRef = ref(db, `rooms/${roomId}`);
      unsubscribeRoom = onValue(roomRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) {
          alert("Room deleted or expired. Return to lobby.");
          showJoinScreen();
          return;
        }
        renderGameUI(data);
        // Auto-advance logic based on state
        handleStateTransitions(data);
      });
    }
    
    // Check conditions to automatically move to next phase
    function handleStateTransitions(data) {
      if (!currentRoomId) return;
      const players = data.players || {};
      const totalPlayers = Object.keys(players).length;
      if (totalPlayers === 0) return;
      
      const gameState = data.gameState;
      
      // ROUND 1: after all votes, compute roast and go to result
      if (gameState === "round1_vote") {
        const votes = data.round1?.votes || {};
        const votedCount = Object.keys(votes).length;
        if (votedCount === totalPlayers && totalPlayers >= 2) {
          // compute roasted player
          let voteCounts = {};
          for (let voterId in votes) {
            let targetId = votes[voterId];
            voteCounts[targetId] = (voteCounts[targetId] || 0) + 1;
          }
          let maxVotes = -1;
          let roastedId = null;
          for (let pid in voteCounts) {
            if (voteCounts[pid] > maxVotes) {
              maxVotes = voteCounts[pid];
              roastedId = pid;
            }
          }
          // tie breaker: pick first among those with max
          if (!roastedId) roastedId = Object.keys(players)[0];
          update(ref(db), {
            [`rooms/${currentRoomId}/round1/roastedPlayerId`]: roastedId,
            [`rooms/${currentRoomId}/gameState`]: "round1_result"
          });
        }
      }
      
      // ROUND 2 SUBMIT: after all messages, go to guess phase
      if (gameState === "round2_submit") {
        const messages = data.round2?.messages || {};
        const submittedCount = Object.keys(messages).length;
        if (submittedCount === totalPlayers && totalPlayers >= 2) {
          update(ref(db), { [`rooms/${currentRoomId}/gameState`]: "round2_guess" });
        }
      }
      
      // ROUND 2 GUESS: after all guesses, compute final scores and end game
      if (gameState === "round2_guess") {
        const guesses = data.round2?.guesses || {};
        const guessedCount = Object.keys(guesses).length;
        if (guessedCount === totalPlayers && totalPlayers >= 2 && !data.gameEnded) {
          // prevent multiple calls
          update(ref(db), { [`rooms/${currentRoomId}/gameEnded`]: true });
          computeFinalScores(data);
        }
      }
    }
    
    async function computeFinalScores(data) {
      const players = data.players;
      const messages = data.round2?.messages || {};
      const guesses = data.round2?.guesses || {};
      const scoreUpdates = {};
      for (let pid in players) scoreUpdates[pid] = players[pid].score;
      
      for (let [guesserId, guessMap] of Object.entries(guesses)) {
        let correct = 0;
        for (let [msgId, guessedPlayerId] of Object.entries(guessMap)) {
          const originalAuthor = messages[msgId]?.authorId;
          if (originalAuthor && guessedPlayerId === originalAuthor) correct++;
        }
        scoreUpdates[guesserId] = (scoreUpdates[guesserId] || 0) + (correct * 10);
      }
      // write back scores and set game over
      const updates = {};
      for (let pid in scoreUpdates) {
        updates[`rooms/${currentRoomId}/players/${pid}/score`] = scoreUpdates[pid];
      }
      updates[`rooms/${currentRoomId}/gameState`] = "game_over";
      await update(ref(db), updates);
    }
    
    // Render UI based on current game state
    function renderGameUI(data) {
      const players = data.players || {};
      const currentPlayer = players[currentPlayerId] || { nickname: "?", score: 0 };
      const roomCode = currentRoomId;
      const totalPlayers = Object.keys(players).length;
      
      const headerHtml = `
        <div class="flex flex-wrap justify-between items-center gap-3 mb-4 bg-gray-900/50 p-3 rounded-2xl backdrop-blur-sm">
          <div class="flex items-center gap-2"><i class="fas fa-hashtag text-orange-400"></i><span class="font-mono font-bold">${roomCode}</span></div>
          <div class="flex items-center gap-2"><i class="fas fa-users"></i><span>${totalPlayers}/6</span></div>
          <div class="flex items-center gap-2"><i class="fas fa-star text-yellow-400"></i><span class="font-bold">${currentPlayer.score} pts</span></div>
        </div>
      `;
      
      // LOBBY
      if (data.gameState === "waiting") {
        const playerItems = Object.values(players).map(p => `<div class="bg-gray-800/70 rounded-full px-4 py-2 text-sm"><i class="fas fa-user-circle mr-2"></i>${p.nickname}</div>`).join('');
        renderScreen(`
          <div class="glass-card p-6 md:p-8 w-full max-w-2xl">
            ${headerHtml}
            <div class="text-center my-6">
              <i class="fas fa-hourglass-half text-5xl text-orange-300 animate-pulse"></i>
              <h2 class="text-2xl font-bold mt-3">Waiting for players...</h2>
              <p class="text-gray-300">need at least 2 players to start 🔥</p>
            </div>
            <div class="flex flex-wrap gap-3 justify-center mt-4">${playerItems}</div>
            <button id="forceStartBtn" class="mt-6 bg-orange-700/50 hover:bg-orange-600 px-5 py-2 rounded-full text-sm">⚡ Force start (if 2+ players)</button>
            <button id="leaveRoomBtn" class="mt-3 bg-red-800/40 hover:bg-red-700 px-5 py-2 rounded-full text-sm w-full">Leave room</button>
          </div>
        `);
        document.getElementById("forceStartBtn")?.addEventListener("click", () => startGameSequence());
        document.getElementById("leaveRoomBtn")?.addEventListener("click", leaveRoom);
        return;
      }
      
      // ROUND 1 VOTE
      if (data.gameState === "round1_vote") {
        const question = data.round1?.question || funnyQuestions[0];
        const votes = data.round1?.votes || {};
        const alreadyVoted = votes[currentPlayerId] !== undefined;
        const otherPlayers = Object.entries(players).filter(([id]) => id !== currentPlayerId);
        let voteButtons = '';
        if (!alreadyVoted) {
          voteButtons = otherPlayers.map(([id, p]) => `
            <button data-vote-id="${id}" class="vote-btn bg-gray-800 hover:bg-orange-600 w-full p-3 rounded-xl flex items-center gap-3 transition">
              <i class="fas fa-user-astronaut text-xl"></i><span class="flex-1 text-left">${p.nickname}</span><i class="fas fa-vote-yea opacity-70"></i>
            </button>
          `).join('');
        } else {
          voteButtons = `<div class="text-center p-4 bg-green-900/30 rounded-xl">✅ You voted! Waiting for others...</div>`;
        }
        const progress = `${Object.keys(votes).length}/${totalPlayers} voted`;
        renderScreen(`
          <div class="glass-card p-6 md:p-8 w-full max-w-2xl">
            ${headerHtml}
            <div class="text-center mb-4"><span class="text-3xl">🗳️</span><h2 class="text-2xl font-bold">Round 1: Vote & Roast</h2><p class="text-orange-300 italic">${question}</p></div>
            <div class="mb-3 text-sm text-gray-400">${progress}</div>
            <div class="grid gap-3 max-h-96 overflow-y-auto">${voteButtons}</div>
            <button id="leaveGameBtn" class="mt-6 bg-red-800/50 w-full py-2 rounded-full text-sm">🚪 Exit game</button>
          </div>
        `);
        if (!alreadyVoted) {
          document.querySelectorAll("[data-vote-id]").forEach(btn => {
            btn.addEventListener("click", async (e) => {
              const targetId = btn.getAttribute("data-vote-id");
              await set(ref(db, `rooms/${currentRoomId}/round1/votes/${currentPlayerId}`), targetId);
              gsap.to(btn, { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });
            });
          });
        }
        document.getElementById("leaveGameBtn")?.addEventListener("click", leaveRoom);
        return;
      }
      
      // ROUND 1 RESULT (roast reveal + give participation points)
      if (data.gameState === "round1_result") {
        const roastedId = data.round1?.roastedPlayerId;
        const roastedName = roastedId && players[roastedId] ? players[roastedId].nickname : "someone";
        const randomRoast = roastMessages[Math.floor(Math.random() * roastMessages.length)].replace("{name}", roastedName);
        // award points only once
        if (!data.round1.pointsAwarded) {
          giveParticipationPoints();
          update(ref(db), { [`rooms/${currentRoomId}/round1/pointsAwarded`]: true });
        }
        renderScreen(`
          <div class="glass-card p-6 md:p-8 w-full max-w-2xl text-center">
            ${headerHtml}
            <div class="my-4"><i class="fas fa-fire text-6xl text-orange-500"></i></div>
            <div class="bg-black/40 p-5 rounded-2xl border-l-8 border-orange-500">
              <p class="text-xl font-black roast-text">🔥 ROAST ALERT 🔥</p>
              <p class="text-lg mt-2">${randomRoast}</p>
            </div>
            <p class="mt-4 text-gray-300">✨ +2 points for everyone (participation)</p>
            <button id="nextRoundBtn" class="mt-6 bg-orange-600 hover:bg-orange-500 px-8 py-3 rounded-full font-bold shadow-xl transition-all">Next Round ➡️ Guess Who</button>
          </div>
        `);
        document.getElementById("nextRoundBtn")?.addEventListener("click", async () => {
          await update(ref(db), { 
            [`rooms/${currentRoomId}/gameState`]: "round2_submit",
            [`rooms/${currentRoomId}/round2`]: { messages: {}, guesses: {} }
          });
        });
        return;
      }
      
      // ROUND 2 SUBMIT MESSAGES
      if (data.gameState === "round2_submit") {
        const messages = data.round2?.messages || {};
        const alreadySubmitted = Object.values(messages).some(m => m.authorId === currentPlayerId);
        let submitArea = '';
        if (!alreadySubmitted) {
          submitArea = `
            <textarea id="anonMsg" rows="2" class="w-full p-3 bg-gray-800 rounded-xl border border-gray-600" placeholder="Write something funny / roast / secret... (anonymous)"></textarea>
            <button id="submitMsgBtn" class="mt-3 bg-purple-600 hover:bg-purple-500 w-full py-2 rounded-full font-bold">📨 Submit anonymous message</button>
          `;
        } else {
          submitArea = `<div class="text-center p-4 bg-green-800/30 rounded-xl"><i class="fas fa-check-circle"></i> Message sent! Waiting for others...</div>`;
        }
        const msgCount = Object.keys(messages).length;
        renderScreen(`
          <div class="glass-card p-6 md:p-8 w-full max-w-2xl">
            ${headerHtml}
            <h2 class="text-2xl font-bold text-center">✍️ Round 2: Anonymous Messages</h2>
            <p class="text-center text-gray-300 mb-4">Everyone submits a spicy anonymous message 🔥</p>
            <div class="bg-gray-800/50 p-3 rounded-xl text-center text-sm">📬 Messages submitted: ${msgCount}/${totalPlayers}</div>
            <div class="mt-5">${submitArea}</div>
            <button id="leaveGameBtn2" class="mt-6 bg-red-800/50 w-full py-2 rounded-full text-sm">Leave game</button>
          </div>
        `);
        if (!alreadySubmitted) {
          document.getElementById("submitMsgBtn")?.addEventListener("click", async () => {
            const text = document.getElementById("anonMsg").value.trim();
            if (!text) return alert("Write something funny!");
            const messageId = "msg_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
            await set(ref(db, `rooms/${currentRoomId}/round2/messages/${messageId}`), { authorId: currentPlayerId, text: text });
            gsap.to("#submitMsgBtn", { scale: 1.05, duration: 0.2, yoyo: true });
          });
        }
        document.getElementById("leaveGameBtn2")?.addEventListener("click", leaveRoom);
        return;
      }
      
      // ROUND 2 GUESS
      if (data.gameState === "round2_guess") {
        const messages = data.round2?.messages || {};
        const guesses = data.round2?.guesses || {};
        const hasGuessed = guesses[currentPlayerId] !== undefined;
        const messagesList = Object.values(messages);
        
        if (!hasGuessed && messagesList.length) {
          let guessFormHtml = `<div class="space-y-6 max-h-[60vh] overflow-y-auto pr-2">`;
          messagesList.forEach((msg, idx) => {
            const options = Object.values(players).map(p => `<option value="${p.nickname}">${p.nickname}</option>`).join('');
            guessFormHtml += `
              <div class="bg-gray-800/70 p-4 rounded-xl">
                <p class="italic text-yellow-200">“${escapeHtml(msg.text)}”</p>
                <select id="guessSelect_${idx}" data-mid="${Object.keys(messages)[idx]}" data-authorid="${msg.authorId}" class="mt-2 w-full p-2 bg-gray-700 rounded-lg text-white">
                  <option value="">Who wrote this?</option>
                  ${options}
                </select>
              </div>
            `;
          });
          guessFormHtml += `<button id="submitGuessesBtn" class="mt-4 bg-green-600 hover:bg-green-500 w-full py-3 rounded-full font-bold text-lg">🔍 Submit guesses (+10 pts each correct)</button></div>`;
          renderScreen(`
            <div class="glass-card p-6 md:p-8 w-full max-w-3xl">
              ${headerHtml}
              <h2 class="text-2xl font-bold text-center">🕵️ Guess Who Wrote It</h2>
              <p class="text-center text-orange-300 mb-3">Match each anonymous message to the player!</p>
              ${guessFormHtml}
              <button id="leaveGuessBtn" class="mt-4 bg-red-800/50 w-full py-2 rounded-full text-sm">Leave Game</button>
            </div>
          `);
          document.getElementById("submitGuessesBtn")?.addEventListener("click", async () => {
            const selects = document.querySelectorAll("[id^='guessSelect_']");
            const guessMap = {};
            for (let sel of selects) {
              const messageKey = sel.getAttribute("data-mid");
              const selectedNick = sel.value;
              if (!selectedNick) return alert("Please guess for all messages!");
              const playerEntry = Object.entries(players).find(([id, p]) => p.nickname === selectedNick);
              if (!playerEntry) return;
              guessMap[messageKey] = playerEntry[0];
            }
            await set(ref(db, `rooms/${currentRoomId}/round2/guesses/${currentPlayerId}`), guessMap);
            gsap.to("#submitGuessesBtn", { scale: 1.05, duration: 0.2, yoyo: true });
          });
          document.getElementById("leaveGuessBtn")?.addEventListener("click", leaveRoom);
        } else {
          const guessedCount = Object.keys(guesses).length;
          renderScreen(`
            <div class="glass-card p-8 text-center max-w-xl">
              ${headerHtml}
              <i class="fas fa-hourglass-half text-5xl text-orange-400 animate-pulse"></i>
              <h2 class="text-2xl mt-4">Waiting for all players to guess...</h2>
              <p>Guessed: ${guessedCount}/${totalPlayers}</p>
              <button id="leaveWaitBtn" class="mt-6 bg-red-800/50 px-5 py-2 rounded-full">Leave</button>
            </div>
          `);
          document.getElementById("leaveWaitBtn")?.addEventListener("click", leaveRoom);
        }
        return;
      }
      
      // GAME OVER SCREEN
      if (data.gameState === "game_over") {
        const finalPlayers = Object.values(players).sort((a,b)=>b.score - a.score);
        const winner = finalPlayers[0];
        renderScreen(`
          <div class="glass-card p-6 md:p-8 w-full max-w-2xl text-center">
            ${headerHtml}
            <i class="fas fa-trophy text-6xl text-yellow-400 mb-2"></i>
            <h2 class="text-3xl font-black">Game Over!</h2>
            <div class="bg-black/30 rounded-2xl p-4 my-4">
              <p class="text-xl">🏆 WINNER: ${winner?.nickname} with ${winner?.score} points 🏆</p>
            </div>
            <div class="grid gap-2 my-4 max-h-60 overflow-y-auto">
              ${finalPlayers.map(p => `<div class="flex justify-between bg-gray-800/60 p-2 rounded-lg"><span>${p.nickname}</span><span class="font-mono">${p.score} pts</span></div>`).join('')}
            </div>
            <button id="replayBtn" class="bg-orange-500 hover:bg-orange-400 px-8 py-3 rounded-full font-bold text-xl mt-2"><i class="fas fa-undo-alt"></i> REPLAY 🔁</button>
            <button id="exitAfterGameBtn" class="mt-3 bg-gray-700 w-full py-2 rounded-full">Exit to Lobby</button>
          </div>
        `);
        document.getElementById("replayBtn")?.addEventListener("click", resetGameForReplay);
        document.getElementById("exitAfterGameBtn")?.addEventListener("click", leaveRoom);
        return;
      }
      
      // fallback
      renderScreen(`<div class="glass-card p-8">Loading...</div>`);
    }
    
    async function giveParticipationPoints() {
      const playersSnap = await get(ref(db, `rooms/${currentRoomId}/players`));
      const players = playersSnap.val();
      if (!players) return;
      const updates = {};
      for (let pid in players) {
        updates[`rooms/${currentRoomId}/players/${pid}/score`] = (players[pid].score || 0) + 2;
      }
      await update(ref(db), updates);
    }
    
    async function startGameSequence() {
      const randomQuestion = funnyQuestions[Math.floor(Math.random() * funnyQuestions.length)];
      const updates = {};
      updates[`rooms/${currentRoomId}/gameState`] = "round1_vote";
      updates[`rooms/${currentRoomId}/round1`] = { votes: {}, roastedPlayerId: null, question: randomQuestion, pointsAwarded: false };
      updates[`rooms/${currentRoomId}/round2`] = { messages: {}, guesses: {} };
      await update(ref(db), updates);
    }
    
    async function resetGameForReplay() {
      const roomRef = ref(db, `rooms/${currentRoomId}`);
      const snap = await get(roomRef);
      const data = snap.val();
      if (!data) return;
      const playersReset = {};
      for (let [pid, p] of Object.entries(data.players)) {
        playersReset[pid] = { nickname: p.nickname, score: 0, joinedAt: Date.now() };
      }
      const resetData = {
        gameState: "waiting",
        players: playersReset,
        round1: { votes: {}, roastedPlayerId: null, question: null, pointsAwarded: false },
        round2: { messages: {}, guesses: {} },
        gameEnded: false
      };
      await update(ref(db, `rooms/${currentRoomId}`), resetData);
    }
    
    async function leaveRoom() {
      if (currentRoomId && currentPlayerId) {
        await remove(ref(db, `rooms/${currentRoomId}/players/${currentPlayerId}`));
      }
      if (unsubscribeRoom) unsubscribeRoom();
      currentRoomId = null;
      currentPlayerId = null;
      showJoinScreen();
    }
    
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m){
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
      });
    }
    
    // Initial load
    const storedId = sessionStorage.getItem("roastPlayerId");
    const storedRoom = sessionStorage.getItem("roastRoomId");
    if (storedId && storedRoom) {
      currentPlayerId = storedId;
      currentRoomId = storedRoom;
      attachRoomListener(storedRoom);
    } else {
      showJoinScreen();
    }
  </script>
</body>
</html>
